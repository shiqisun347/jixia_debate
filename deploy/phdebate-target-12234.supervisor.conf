[program:jixia-debate]
priority=10
directory=/home/ubuntu/sunsq/debateall/apps/backend
command=/bin/bash -lc 'set -a; source /home/ubuntu/sunsq/debateall/.env; set +a; exec /home/ubuntu/sunsq/debateall/.venv/bin/uvicorn app.main:app --host 0.0.0.0 --port 12234 --no-access-log'
environment=PYTHONPATH="/home/ubuntu/sunsq/debateall/apps/backend",PYTHONUNBUFFERED="1"
autostart=true
autorestart=true
startsecs=5
startretries=5
stopasgroup=true
killasgroup=true
stdout_logfile=/home/ubuntu/sunsq/debateall/runtime/logs/jixia-debate.stdout.log
stderr_logfile=/home/ubuntu/sunsq/debateall/runtime/logs/jixia-debate.stderr.log
stdout_logfile_maxbytes=50MB
stderr_logfile_maxbytes=50MB
stdout_logfile_backups=5
stderr_logfile_backups=5

