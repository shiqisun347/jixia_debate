command=/bin/bash -lc 'set -a; source /home/ubuntu/sunsq/debateall/.env; set +a; exec /home/ubuntu/sunsq/debateall/.venv/bin/uvicorn app:app --host 127.0.0.1 --port 12235 --no-access-log'
environment=PYTHONPATH="/home/ubuntu/sunsq/debateall/apps/voice_agent",PYTHONUNBUFFERED="1"
